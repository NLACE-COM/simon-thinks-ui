<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--bg-canvas);padding:var(--space-6);color:var(--text-primary)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)}
  .panel{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-5)}
  .metric{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
  .metric .v{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);letter-spacing:var(--tracking-tight)}
  .metric .l{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:var(--tracking-wide)}
  .delta{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--green-500)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { BarChart, LineChart, DonutChart, Sparkline } = window.SIMONTHINKSDesignSystem_ec5f0a;
  function Demo(){
    return (
      <div className="grid">
        <div className="panel">
          <BarChart title="Decisiones por módulo" data={[
            {label:'THINK', value:42},{label:'CORE', value:78},{label:'CUSTOM', value:31},{label:'LIGHT', value:56},
          ]} />
        </div>
        <div className="panel">
          <LineChart title="Confianza media por trimestre" categories={['Q1','Q2','Q3','Q4']} series={[
            {name:'CORE', data:[62,68,74,81]},
            {name:'THINK', data:[40,52,58,63]},
          ]} />
        </div>
        <div className="panel">
          <DonutChart title="Decisiones por estado" centerValue="184" centerLabel="total" data={[
            {label:'Aprobadas', value:120, color:'var(--green-500)'},
            {label:'En revisión', value:44, color:'var(--amber-500)'},
            {label:'Bloqueadas', value:20, color:'var(--red-500)'},
          ]} />
        </div>
        <div className="panel" style={{display:'flex',flexDirection:'column',gap:'var(--space-4)',justifyContent:'center'}}>
          <div className="metric">
            <div><div className="v">87%</div><div className="l">confianza media</div></div>
            <Sparkline values={[58,62,60,68,72,74,81,87]} />
          </div>
          <div className="metric">
            <div><div className="v">184</div><div className="l">decisiones · 30d</div></div>
            <Sparkline values={[120,128,134,150,162,170,178,184]} color="var(--blue-500)" />
          </div>
          <div className="metric">
            <div><div className="v">12m <span className="delta">▲</span></div><div className="l">retorno de riesgo</div></div>
            <Sparkline values={[4,5,7,6,9,10,11,12]} color="var(--green-500)" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
