<!-- @dsCard group="Colors" viewport="700x150" name="Ink neutrals" subtitle="Cool near-black → light. Structure, type, surfaces." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;gap:var(--space-2)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(11,11,15,.06)}
  .meta{display:flex;flex-direction:column;gap:1px}
  .n{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
  .h{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="meta"><span class="n">950</span><span class="h">#0F0E14</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><span class="n">900</span><span class="h">#17161D</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><span class="n">800</span><span class="h">#201E27</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><span class="n">700</span><span class="h">#2D2B35</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><span class="n">500</span><span class="h">#5D5B66</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><span class="n">400</span><span class="h">#87858F</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="meta"><span class="n">300</span><span class="h">#B0AEB6</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="meta"><span class="n">200</span><span class="h">#D6D5DA</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="meta"><span class="n">100</span><span class="h">#E9E9EC</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-50)"></div><div class="meta"><span class="n">50</span><span class="h">#F6F6F6</span></div></div>
</body></html>
