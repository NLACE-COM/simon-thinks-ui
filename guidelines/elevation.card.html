<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & glow" subtitle="Quiet shadows; violet glow on active nodes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-6);display:flex;gap:var(--space-5);align-items:center;justify-content:center;background:var(--bg-canvas)}
  .item{display:flex;flex-direction:column;align-items:center;gap:var(--space-3)}
  .box{width:84px;height:60px;background:var(--white);border-radius:var(--radius-md)}
  .tok{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="tok">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="tok">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="tok">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="tok">xl</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-glow)"></div><span class="tok">glow</span></div>
</body></html>
