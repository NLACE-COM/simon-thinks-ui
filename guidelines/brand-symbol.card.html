<!-- @dsCard group="Brand" viewport="700x200" name="Symbol — the modular mark" subtitle="Interlocking nodes form the 'S'. Violet, ink, white, vertical lockup." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);display:flex;gap:var(--space-3);padding:var(--space-5);align-items:stretch}
  .tile{flex:1;border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-3);padding:var(--space-5);border:1px solid var(--border-subtle)}
  .tile img{height:56px}
  .vlabel{font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--text-muted)}
  .on-dark{background:var(--ink-950);border-color:var(--ink-800)}
  .on-dark .vlabel{color:var(--ink-400)}
  .vert img{height:74px}
</style></head>
<body>
  <div class="tile"><img src="../assets/symbol-violet.svg" alt="symbol"><span class="vlabel">Violet</span></div>
  <div class="tile"><img src="../assets/symbol.svg" alt="symbol"><span class="vlabel">Ink</span></div>
  <div class="tile on-dark"><img src="../assets/symbol-white.svg" alt="symbol"><span class="vlabel">White</span></div>
  <div class="tile vert on-dark"><img src="../assets/logo-vertical-white.svg" alt="vertical lockup"><span class="vlabel">Vertical</span></div>
</body></html>
