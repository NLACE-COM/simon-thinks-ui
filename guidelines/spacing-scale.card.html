<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;align-items:flex-end;gap:var(--space-3);justify-content:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
  .bar{background:var(--violet-500);border-radius:var(--radius-xs);width:100%}
  .box{display:flex;align-items:flex-end;height:72px}
  .tok{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
  .px{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="item"><div class="box"><div class="bar" style="width:4px;height:4px"></div></div><span class="tok">1</span><span class="px">4</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:8px;height:8px"></div></div><span class="tok">2</span><span class="px">8</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:12px;height:12px"></div></div><span class="tok">3</span><span class="px">12</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:16px;height:16px"></div></div><span class="tok">4</span><span class="px">16</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:24px;height:24px"></div></div><span class="tok">6</span><span class="px">24</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:32px;height:32px"></div></div><span class="tok">8</span><span class="px">32</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:48px;height:48px"></div></div><span class="tok">12</span><span class="px">48</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:64px;height:64px"></div></div><span class="tok">16</span><span class="px">64</span></div>
</body></html>
