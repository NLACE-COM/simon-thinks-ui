<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-body);color:var(--text-primary);
    background:var(--bg-surface);min-height:100vh;display:flex;flex-direction:column}
  .nav{display:flex;align-items:center;justify-content:space-between;
    padding:var(--space-5) var(--space-8);border-bottom:1px solid var(--border-subtle)}
  .nav img{height:26px}
  .nav .links{display:flex;align-items:center;gap:var(--space-6)}
  .nav .links a{font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-wide);
    text-transform:uppercase;color:var(--text-secondary);text-decoration:none}
  .btn{font-family:var(--font-body);font-weight:var(--weight-semibold);font-size:var(--text-sm);
    border-radius:var(--radius-pill);padding:10px 18px;border:1px solid transparent;cursor:pointer;line-height:1;white-space:nowrap}
  .btn.primary{background:var(--violet-500);color:#fff}
  .btn.ghost{background:transparent;color:var(--text-primary);border-color:var(--border-default)}
  .btn.lg{font-size:var(--text-base);padding:13px 24px}

  .hero{flex:1;display:grid;grid-template-columns:minmax(0,1.04fr) minmax(0,1fr);align-items:center;
    gap:var(--space-9);padding:var(--space-12) var(--space-8)}
  .stage{position:relative;align-self:stretch;display:flex;align-items:center;justify-content:center}
  .stage .glow{position:absolute;width:78%;height:78%;left:50%;top:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle,color-mix(in srgb,var(--violet-500) 34%,transparent),transparent 70%);
    filter:blur(46px);pointer-events:none}
  .frame{position:relative;width:100%;height:100%;max-height:440px;border-radius:var(--radius-2xl);
    overflow:hidden;border:1px solid var(--border-subtle);box-shadow:var(--shadow-lg)}
  .frame .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
  .frame .tint{position:absolute;inset:0;
    background:radial-gradient(120% 90% at 70% 30%,transparent,color-mix(in srgb,var(--violet-600) 16%,transparent))}
  .copy{position:relative;z-index:2;display:flex;flex-direction:column;gap:var(--space-5)}
  .eyebrow{font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-wider);
    text-transform:uppercase;color:var(--text-accent)}
  h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-5xl);
    letter-spacing:var(--tracking-tighter);line-height:1.0;margin:0}
  h1 .keep{white-space:nowrap}
  h1 em{font-style:normal;color:var(--violet-500)}
  .sub{font-size:var(--text-md);color:var(--text-secondary);line-height:var(--leading-snug);margin:0;max-width:34ch}
  .cta{display:flex;gap:var(--space-3);margin-top:var(--space-2)}
  .mods{display:flex;gap:var(--space-2);margin-top:var(--space-4)}
  .mods span{font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-wide);
    color:var(--text-muted);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:5px 11px}

  .mark{position:absolute;z-index:3;bottom:var(--space-5);right:var(--space-5);height:26px;
    filter:drop-shadow(0 2px 10px rgba(11,11,15,.28))}
</style></head>
<body>
  <header class="nav">
    <img src="../assets/logo-horizontal-notagline.svg" alt="SIMON THINKS">
    <div class="links">
      <a href="#">Producto</a><a href="#">Módulos</a><a href="#">Seguridad</a>
      <button class="btn primary">Solicitar demo</button>
    </div>
  </header>
  <main class="hero">
    <div class="copy">
      <span class="eyebrow">Gobernanza de IA · Decisiones reales</span>
      <h1>Conocimiento <span class="keep">en <em>decisiones.</em></span></h1>
      <p class="sub">El sistema que piensa <em style="color:var(--violet-600);font-style:normal">con</em> las organizaciones — gobernanza, contexto y evidencia en cada decisión.</p>
      <div class="cta">
        <button class="btn primary lg">Empezar</button>
        <button class="btn ghost lg">Ver módulos</button>
      </div>
      <div class="mods"><span>THINK</span><span>CORE</span><span>CUSTOM</span><span>LIGHT</span></div>
    </div>
    <div class="stage">
      <div class="glow"></div>
      <div class="frame">
        <img class="bg" src="../assets/media/optimized/images/pexels-googledeepmind-18069695-hero.webp" alt="">
        <div class="tint"></div>
      </div>
    </div>
  </main>
</body></html>
