<!-- @dsCard group="Colors" viewport="700x150" name="Status & support" subtitle="Status sólido y legible — usado junto al violeta" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;gap:var(--space-3)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
  .chip{height:56px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:var(--space-2);box-shadow:inset 0 0 0 1px rgba(15,14,20,.06)}
  .soft{height:20px;border-radius:var(--radius-sm)}
  .meta{display:flex;flex-direction:column;gap:1px}
  .n{font-size:var(--text-xs);color:var(--text-primary);font-weight:600}
  .h{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="soft" style="background:var(--green-soft)"></div><div class="meta"><span class="n">Success</span><span class="h">#1FA971</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--amber-500)"></div><div class="soft" style="background:var(--amber-soft)"></div><div class="meta"><span class="n">Warning</span><span class="h">#E0962B</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--red-500)"></div><div class="soft" style="background:var(--red-soft)"></div><div class="meta"><span class="n">Danger</span><span class="h">#D64550</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--context-500)"></div><div class="soft" style="background:var(--context-soft)"></div><div class="meta"><span class="n">Context</span><span class="h">#4C6FE0</span></div></div>
</body></html>
