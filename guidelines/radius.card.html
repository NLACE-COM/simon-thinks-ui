<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Echoes the rounded modular blocks of the mark" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;gap:var(--space-4);align-items:center;justify-content:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
  .box{width:64px;height:64px;background:var(--violet-100);border:1.5px solid var(--violet-500)}
  .tok{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
  .px{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tok">xs</span><span class="px">4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">sm</span><span class="px">6</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md</span><span class="px">10</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg</span><span class="px">14</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">xl</span><span class="px">20</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="tok">2xl</span><span class="px">28</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="tok">pill</span><span class="px">∞</span></div>
</body></html>
