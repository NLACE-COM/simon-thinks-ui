<!-- @dsCard group="Colors" viewport="700x150" name="Brand violet" subtitle="#9D50FF core — humanity + technology with purpose" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;gap:var(--space-2)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(11,11,15,.06)}
  .meta{display:flex;flex-direction:column;gap:1px}
  .n{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
  .h{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
  .core .n{color:var(--violet-700);font-weight:600}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--violet-50)"></div><div class="meta"><span class="n">50</span><span class="h">#F4ECFF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-100)"></div><div class="meta"><span class="n">100</span><span class="h">#EADBFF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-200)"></div><div class="meta"><span class="n">200</span><span class="h">#D6B8FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-300)"></div><div class="meta"><span class="n">300</span><span class="h">#C293FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-400)"></div><div class="meta"><span class="n">400</span><span class="h">#AE6EFF</span></div></div>
  <div class="sw core"><div class="chip" style="background:var(--violet-500)"></div><div class="meta"><span class="n">500</span><span class="h">#9D50FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-600)"></div><div class="meta"><span class="n">600</span><span class="h">#883CF2</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-700)"></div><div class="meta"><span class="n">700</span><span class="h">#7126D6</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-800)"></div><div class="meta"><span class="n">800</span><span class="h">#561CA6</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-900)"></div><div class="meta"><span class="n">900</span><span class="h">#3D1478</span></div></div>
</body></html>
