<!-- @dsCard group="Colors" viewport="700x150" name="Brand blue" subtitle="#002ADD secondary — context, links, the rare second voice" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;gap:var(--space-2)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(11,11,15,.06)}
  .meta{display:flex;flex-direction:column;gap:1px}
  .n{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
  .h{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
  .core .n{color:var(--blue-600);font-weight:600}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><span class="n">50</span><span class="h">#E8ECFF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><span class="n">100</span><span class="h">#C9D2FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-200)"></div><div class="meta"><span class="n">200</span><span class="h">#99A8FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><span class="n">300</span><span class="h">#6076FF</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><span class="n">400</span><span class="h">#2E48F2</span></div></div>
  <div class="sw core"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><span class="n">500</span><span class="h">#002ADD</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><span class="n">600</span><span class="h">#0022B4</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><span class="n">700</span><span class="h">#001B8F</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-800)"></div><div class="meta"><span class="n">800</span><span class="h">#00146B</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="meta"><span class="n">900</span><span class="h">#000E47</span></div></div>
</body></html>
