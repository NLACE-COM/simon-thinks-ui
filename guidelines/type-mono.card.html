<!-- @dsCard group="Type" viewport="700x150" name="Mono & eyebrow — JetBrains Mono" subtitle="Technical labels, node IDs, module tags" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:var(--space-5);display:flex;flex-direction:column;justify-content:center;gap:var(--space-4)}
  .eyebrow{font-family:var(--font-mono);font-size:var(--text-xs);font-weight:500;letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--text-accent)}
  .tags{display:flex;gap:var(--space-2);flex-wrap:wrap}
  .tag{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:2px var(--space-2)}
  .id{font-family:var(--font-mono);font-size:var(--text-md);color:var(--text-primary);letter-spacing:0}
</style></head>
<body>
  <span class="eyebrow">Memoria · Contexto · Decisión</span>
  <div class="id">node://core/think · 0x9D50FF</div>
  <div class="tags"><span class="tag">THINK</span><span class="tag">CORE</span><span class="tag">CUSTOM</span><span class="tag">LIGHT</span><span class="tag">v2.4.0</span></div>
</body></html>
