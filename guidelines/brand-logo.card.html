<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);padding:var(--space-5)}
  .panel{border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;padding:var(--space-6);min-height:96px}
  .light{background:var(--bg-surface);border:1px solid var(--border-subtle)}
  .dark{background:var(--ink-950)}
  .panel img{height:34px}
</style></head>
<body>
  <div class="panel light"><img src="../assets/logo-horizontal.svg" alt="SIMON THINKS"></div>
  <div class="panel dark"><img src="../assets/logo-horizontal-white.svg" alt="SIMON THINKS"></div>
</body></html>
