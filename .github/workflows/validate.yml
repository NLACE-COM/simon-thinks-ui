name: Validate design system

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Integrity check (structure, tokens, fonts, manifest)
        run: node .design-sync/validate.mjs

      - name: Adherence lint (oxlint, non-blocking)
        run: |
          npx --yes oxlint@latest \
            --config _adherence.oxlintrc.json \
            components/ || echo "oxlint reported findings (non-blocking)"
