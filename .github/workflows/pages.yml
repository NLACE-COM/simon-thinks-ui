name: Deploy showcase to Pages

# Publishes the design-system showcase (index.html + assets) to GitHub Pages.
# Checks out Git LFS so the media bank (images/videos) is uploaded as real
# binaries — the legacy branch-based Pages build does NOT resolve LFS and
# would serve pointer text, breaking the live deck / social / hero embeds.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Checkout LFS objects
        run: git lfs checkout
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
